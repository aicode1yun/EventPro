name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $parts = $version.Split('.')
          $versionCode = [int]$parts[0] * 10000 + [int]$parts[1] * 100 + [int]$parts[2]
          (Get-Content Ticket.csproj) -replace '<ApplicationDisplayVersion>.*</ApplicationDisplayVersion>', "<ApplicationDisplayVersion>$version</ApplicationDisplayVersion>" | Set-Content Ticket.csproj
          (Get-Content Ticket.csproj) -replace '<ApplicationVersion>.*</ApplicationVersion>', "<ApplicationVersion>$versionCode</ApplicationVersion>" | Set-Content Ticket.csproj
          Write-Host "Set version to $version ($versionCode)"

      - name: Set up Android keystore
        shell: pwsh
        run: |
          $base64 = "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          if ([string]::IsNullOrEmpty($base64)) {
            Write-Host "No ANDROID_KEYSTORE_BASE64 secret - APK will not be signed"
            return
          }
          $bytes = [Convert]::FromBase64String($base64)
          [IO.File]::WriteAllBytes("${{ github.workspace }}\EventPro.keystore", $bytes)
          Write-Host "Keystore created from secret"

      - name: Publish Android APK
        shell: pwsh
        run: |
          $signProps = ""
          if (Test-Path "${{ github.workspace }}\EventPro.keystore") {
            $alias = "${{ secrets.ANDROID_KEY_ALIAS }}"
            $keyPass = "${{ secrets.ANDROID_KEY_PASS }}"
            $storePass = "${{ secrets.ANDROID_KEYSTORE_PASS }}"
            $signProps = "/p:AndroidKeyStore=true /p:AndroidSigningKeyStore=${{ github.workspace }}\EventPro.keystore /p:AndroidSigningKeyAlias=$alias /p:AndroidSigningKeyPass=$keyPass /p:AndroidSigningStorePass=$storePass"
          }
          dotnet publish -f net10.0-android -c Release $signProps

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: EventPro-APK
          path: bin/Release/net10.0-android/*-Signed.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: EventPro-APK

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: EventPro ${{ github.ref_name }}
          body: |
            ## EventPro ${{ github.ref_name }}

            Download the APK below and install it on your Android device.
          files: "*.apk"
