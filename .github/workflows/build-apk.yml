name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build APK
        run: dotnet publish -f net10.0-android -c Release -p:WarningLevel=0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EventPro-APK
          path: |
            **/*.apk
            **/*.aab
